name: CI/CD I See U — EKS

on:
  push:
    branches: [ master ]
  workflow_dispatch: {}

env:
  ECR_REPO_BACKEND: namespace/iseeu-backend
  ECR_REPO_FRONTEND: namespace/iseeu-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # ---------- BACKEND (.NET 10) ----------
      - name: Build & push BACKEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/${ECR_REPO_BACKEND}:${IMAGE_TAG} .
          docker push $ECR_REGISTRY/${ECR_REPO_BACKEND}:${IMAGE_TAG}

      # ---------- FRONTEND (NGINX) ----------
      - name: Build & push FRONTEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd frontend
          docker build -t $ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG} .
          docker push $ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG}

      # ---------- Instalar kubectl ----------
      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      # ---------- Configurar kubeconfig de EKS ----------
      - name: Configurar kubeconfig para EKS
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

      # ---------- Aplicar manifests base ----------
      - name: Aplicar namespace y PostgreSQL
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/postgres/ -n $EKS_NAMESPACE

      # ---------- Desplegar BACKEND ----------
      - name: Desplegar BACKEND en EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl apply -f k8s/backend/ -n $EKS_NAMESPACE
          kubectl set image deployment/backend \
            backend=$ECR_REGISTRY/${ECR_REPO_BACKEND}:${IMAGE_TAG} \
            -n $EKS_NAMESPACE
          kubectl rollout status deployment/backend -n $EKS_NAMESPACE

      # ---------- Desplegar FRONTEND ----------
      - name: Desplegar FRONTEND en EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl apply -f k8s/frontend/ -n $EKS_NAMESPACE
          kubectl set image deployment/frontend \
            frontend=$ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG} \
            -n $EKS_NAMESPACE
          kubectl rollout status deployment/frontend -n $EKS_NAMESPACE

      # ---------- HPA ----------
      - name: Aplicar HPA
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl apply -f k8s/backend/hpa.yaml -n $EKS_NAMESPACE
          kubectl apply -f k8s/frontend/hpa.yaml -n $EKS_NAMESPACE

      # ---------- Ver estado final ----------
      - name: Ver pods, servicios y HPA
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl get pods -n $EKS_NAMESPACE
          kubectl get svc -n $EKS_NAMESPACE
          kubectl get hpa -n $EKS_NAMESPACE
